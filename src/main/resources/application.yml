spring:
  application:
    name: betting-service

  datasource:
    url: ${BETTING_DB_URL:jdbc:postgresql://localhost:5432/betting}
    username: ${BETTING_DB_USER:betting}
    password: ${BETTING_DB_PASSWORD:betting}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      pool-name: betting-hikari

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

  kafka:
    bootstrap-servers: ${BETTING_KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      client-id: betting-service
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5

  data:
    redis:
      host: ${BETTING_REDIS_HOST:localhost}
      port: ${BETTING_REDIS_PORT:6379}
      # Odds-cache reads are on the placement critical path (ADR-0017); keep the
      # socket timeout tight so a slow Redis fails fast instead of stalling.
      timeout: 200ms

server:
  port: ${BETTING_HTTP_PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  metrics:
    tags:
      service: betting-service

logging:
  level:
    root: INFO
    com.sportsbook.betting: INFO
    org.hibernate.SQL: WARN

# Betting slip policy (ADR-0008 / ADR-0009). Type-safe bound into
# BettingPolicyProperties; a malformed value fails startup.
betting:
  policy:
    max-selections: 15
    max-total-odds: 10000
    min-stake:
      KRW: 1000
      USD: 100
    max-stake:
      KRW: 1000000
      USD: 1000
    slippage-tolerance-percent: 3

  # Synchronous risk / wallet dependencies (ADR-0017). Timeouts are the
  # fail-fast bound on the placement critical path.
  clients:
    risk-base-url: ${RISK_BASE_URL:http://localhost:8083}
    wallet-base-url: ${WALLET_BASE_URL:http://localhost:8081}
    connect-timeout: 200ms
    read-timeout: 500ms

# Resilience4j (ADR-0017). Only DependencyUnavailableException (the fail-closed
# signal the clients raise on timeout / 5xx / connection error) is recorded, so
# business rejections (limit exceeded, insufficient balance) never trip a breaker.
resilience4j:
  circuitbreaker:
    configs:
      default:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 5
        record-exceptions:
          - com.sportsbook.betting.error.DependencyUnavailableException
    instances:
      riskClient:
        base-config: default
      walletClient:
        base-config: default
