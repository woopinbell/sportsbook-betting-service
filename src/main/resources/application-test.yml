spring:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    clean-disabled: false
  # datasource / data.redis / kafka are filled by @DynamicPropertySource from
  # Testcontainers in each integration test class — leaving them unset here so
  # a forgotten override surfaces as a NoSuchBeanDefinitionException instead of
  # silently falling back to a stale local PostgreSQL.

betting:
  # Park both @Scheduled jobs (24h) so each test drives the outbox publisher /
  # reconciliation explicitly. pending-timeout 0s makes any PENDING bet
  # immediately eligible for the reconciliation scan.
  outbox:
    poll-interval-ms: 86400000
  reconciliation:
    poll-interval-ms: 86400000
    pending-timeout: 0s
  # Settlement Kafka listener is parked by default in tests; the settlement
  # integration test re-enables it once its embedded broker is up.
  kafka:
    consumer:
      auto-startup: false

logging:
  level:
    com.sportsbook.betting: DEBUG
